name: MobileTradeIn-$(Date:yyyyMMdd)-$(Rev:r)

trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: windows-latest

variables:
- group: MobileTradeIn-DEV

- name: BuildConfiguration
  value: Release

- name: DotNetVersion
  value: 9.0.x

stages:

#==========================
# BUILD
#==========================
- stage: Build
  displayName: Build Stage

  jobs:

  - job: Build

    steps:

    - task: UseDotNet@2
      displayName: Install .NET SDK
      inputs:
        packageType: sdk
        version: $(DotNetVersion)

    - task: AzureKeyVault@2
      displayName: 'Download secrets from Azure Key Vault'
      inputs:
        azureSubscription: 'MobileTradeIn-ServiceConnection'
        KeyVaultName: 'kv-mobiletradein-dev'
        SecretsFilter: '*'
        RunAsPreJob: true

    - task: DotNetCoreCLI@2
      displayName: Restore
      inputs:
        command: restore
        projects: '**/*.sln'

    - task: DotNetCoreCLI@2
      displayName: Build
      inputs:
        command: build
        projects: '**/*.sln'
        arguments: '--configuration $(BuildConfiguration) --no-restore'

#==========================
# TEST
#==========================
- stage: Test
  displayName: Test Stage

  dependsOn: Build

  jobs:

  - job: Test

    steps:

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: $(DotNetVersion)

    - task: DotNetCoreCLI@2
      displayName: Test
      inputs:
        command: test
        projects: '**/*Tests/*.csproj'
        arguments: >
          --configuration $(BuildConfiguration)
          --collect:"XPlat Code Coverage"
          --logger trx

    - task: PublishTestResults@2
      inputs:
        testResultsFormat: VSTest
        testResultsFiles: '**/*.trx'

    - task: PublishCodeCoverageResults@2
      inputs:
        codeCoverageTool: Cobertura
        summaryFileLocation: '**/coverage.cobertura.xml'

#==========================
# PUBLISH
#==========================
- stage: Publish
  displayName: Publish Stage

  dependsOn: Test

  jobs:

  - job: Publish

    steps:

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: $(DotNetVersion)

    - task: DotNetCoreCLI@2
      displayName: Publish API
      inputs:
        command: publish
        publishWebProjects: false
        projects: '**/MobileTradeIn.Api.csproj'
        arguments: >
          --configuration $(BuildConfiguration)
          --output $(Build.ArtifactStagingDirectory)

    - task: PublishPipelineArtifact@1
      displayName: Publish Pipeline Artifact
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: 'MobileTradeIn'

#==========================
# DEPLOY
#==========================
- stage: Deploy
  displayName: Deploy Stage

  dependsOn: Publish

  jobs:

  - deployment: DeployWebApp

    displayName: Deploy to Azure App Service

    environment: dev

    strategy:

      runOnce:

        deploy:

          steps:

          - download: current
            artifact: MobileTradeIn

          - task: AzureWebApp@1
            displayName: Deploy to Azure App Service

            inputs:
              azureSubscription: 'MobileTradeIn-ServiceConnection'
              appType: webApp
              appName: 'mobiletradein-api'
              package: '$(Pipeline.Workspace)/MobileTradeIn/**/*.zip'